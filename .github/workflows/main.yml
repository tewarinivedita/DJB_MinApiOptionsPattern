name: Publish
on: 
  workflow_dispatch:
    push: 
        branches:
         -main
jobs:
   publish:
     runs-on: ubuntu-latest
     steps:
       - uses: actions/checkout@v3
       - name: setup .NET
         uses: actions/setup-dotnet@v3
         with:
           dotnet-version: 8.0.0
       -name: Restore
       run: dotnet restore ./DJB_EFCleanArch.slnx
      
       -name: Build
       run: dotnet build ./DJB_EFCleanArch.slnx --configuration Release --no restore
      
       -name: Publish
       run: dotnet publish ./DJB_EFCleanArch.slnx --configuration Release --no build
