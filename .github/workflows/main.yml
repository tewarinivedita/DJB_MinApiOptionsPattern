name: Publish
on: 
  workflow_dispatch:
  push: 
      branches:
      - master
env:
  AZURE_WEBAPP_NAME: DJBAPI
  AZURE_WEBAPP_PACKAGE_PATH: "./publish"
  
jobs:
   publish:
     runs-on: ubuntu-latest
     
     steps:
       - uses: actions/checkout@v4
       - name: setup .NET 8
         uses: actions/setup-dotnet@v4
         with:
           dotnet-version: 8.0.x
       - name: Restore
         run: dotnet restore ./DJB_EFCleanArch.slnx
      
       - name: Build
         run: dotnet build ./DJB_EFCleanArch.slnx --configuration Release --no-restore
      
       - name: Publish
         run: dotnet publish ./DJB_EFCleanArch.slnx --configuration Release --no-build --output '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}'
         
       - name: Deployment
         uses: azure/webapps-deploy@v3
         with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: "${{ env.AZURE_WEBAPP_PACKAGE_PATH }}"
